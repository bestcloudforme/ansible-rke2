---
- name: Validate snapshot name is provided
  ansible.builtin.assert:
    that:
      - rke2_etcd_restore_snapshot | default('') | length > 0
    fail_msg: >-
      rke2_etcd_restore_snapshot must be set.
      Use -e "rke2_etcd_restore_snapshot=<snapshot-name>" to specify.
      Run 'rke2 etcd-snapshot list' on a master to see available snapshots.

- name: Stop rke2-server on all masters
  ansible.builtin.systemd:
    name: rke2-server
    state: stopped

- name: Build etcd restore command
  ansible.builtin.set_fact:
    _etcd_restore_cmd: >-
      {{ rke2_bin_dir }}/rke2 server
      --cluster-reset
      --cluster-reset-restore-path={{ rke2_etcd_restore_snapshot }}
      --data-dir {{ rke2_data_dir }}
      {% if rke2_etcd_s3_enabled | default(false) | bool %}
      --etcd-s3
      --etcd-s3-bucket {{ rke2_etcd_s3_bucket }}
      {% if rke2_etcd_s3_endpoint | default('') | length > 0 %}
      --etcd-s3-endpoint {{ rke2_etcd_s3_endpoint }}
      {% endif %}
      {% if rke2_etcd_s3_region | default('') | length > 0 %}
      --etcd-s3-region {{ rke2_etcd_s3_region }}
      {% endif %}
      {% if rke2_etcd_s3_folder | default('') | length > 0 %}
      --etcd-s3-folder {{ rke2_etcd_s3_folder }}
      {% endif %}
      {% if rke2_etcd_s3_skip_ssl_verify | default(false) | bool %}
      --etcd-s3-skip-ssl-verify
      {% endif %}
      {% endif %}
  no_log: true
  when: inventory_hostname == groups['masters'][0]

- name: Restore etcd snapshot (bootstrap master only)
  ansible.builtin.command:
    cmd: "{{ _etcd_restore_cmd }}"
  environment: "{{ _s3_env }}"
  when: inventory_hostname == groups['masters'][0]
  changed_when: true
  async: 300
  poll: 10
  no_log: true
  vars:
    _s3_env: "{{ {'AWS_ACCESS_KEY_ID': rke2_etcd_s3_access_key, 'AWS_SECRET_ACCESS_KEY': rke2_etcd_s3_secret_key} if (rke2_etcd_s3_enabled | default(false) | bool and rke2_etcd_s3_access_key | default('') | length > 0) else {} }}"

- name: Remove cluster-reset flag file
  ansible.builtin.file:
    path: "{{ rke2_data_dir }}/server/db/reset-flag"
    state: absent
  when: inventory_hostname == groups['masters'][0]

- name: Start rke2-server on bootstrap master
  ansible.builtin.systemd:
    name: rke2-server
    state: started
  when: inventory_hostname == groups['masters'][0]

- name: Wait for API to be ready on bootstrap master
  ansible.builtin.wait_for:
    host: localhost
    port: 6443
    delay: 10
    timeout: 300
  when: inventory_hostname == groups['masters'][0]

- name: Remove old etcd data on other masters
  ansible.builtin.file:
    path: "{{ rke2_data_dir }}/server/db"
    state: absent
  when: inventory_hostname != groups['masters'][0]

- name: Start rke2-server on other masters
  ansible.builtin.systemd:
    name: rke2-server
    state: started
  when: inventory_hostname != groups['masters'][0]

- name: Wait for all masters to be Ready
  ansible.builtin.command:
    cmd: >
      {{ rke2_bin_dir }}/kubectl
      --kubeconfig {{ rke2_config_dir }}/rke2.yaml
      get nodes -l node-role.kubernetes.io/control-plane
      -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}'
  register: masters_ready
  until: "'False' not in masters_ready.stdout and masters_ready.stdout | length > 0"
  retries: 30
  delay: 10
  changed_when: false
  when: inventory_hostname == groups['masters'][0]

- name: Restore complete
  ansible.builtin.debug:
    msg: "etcd restore from '{{ rke2_etcd_restore_snapshot }}' completed. All masters are Ready."
  when: inventory_hostname == groups['masters'][0]
