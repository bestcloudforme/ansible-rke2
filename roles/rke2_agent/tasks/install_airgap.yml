---
- name: Verify airgap artifacts directory exists
  ansible.builtin.stat:
    path: "{{ rke2_airgap_images_path }}"
  register: airgap_dir

- name: Fail if airgap artifacts are missing
  ansible.builtin.assert:
    that:
      - airgap_dir.stat.exists
      - airgap_dir.stat.isdir
    fail_msg: "Airgap artifacts not found at {{ rke2_airgap_images_path }}"

- name: Check if RKE2 agent is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/rke2
  register: rke2_binary

- name: Copy RKE2 install script from airgap artifacts
  ansible.builtin.copy:
    src: "{{ rke2_airgap_images_path }}/install.sh"
    dest: /tmp/rke2-install.sh
    mode: '0755'
    remote_src: true
  when: not rke2_binary.stat.exists

- name: Install RKE2 agent (airgap)
  ansible.builtin.command:
    cmd: /tmp/rke2-install.sh
    creates: /usr/local/bin/rke2
  environment:
    INSTALL_RKE2_VERSION: "{{ rke2_version }}"
    INSTALL_RKE2_TYPE: "agent"
    INSTALL_RKE2_ARTIFACT_PATH: "{{ rke2_airgap_images_path }}"
