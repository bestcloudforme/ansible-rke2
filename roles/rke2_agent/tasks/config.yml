---
- name: Create RKE2 config directory
  ansible.builtin.file:
    path: "{{ rke2_config_dir }}"
    state: directory
    mode: '0700'

- name: Retrieve token from bootstrap master
  ansible.builtin.set_fact:
    rke2_server_token: "{{ hostvars[groups['masters'][0]]['rke2_node_token']['content'] | b64decode | trim }}"
  no_log: true
  when:
    - hostvars[groups['masters'][0]]['rke2_node_token'] is defined
    - hostvars[groups['masters'][0]]['rke2_node_token']['content'] is defined

- name: Validate server token is available
  ansible.builtin.assert:
    that:
      - rke2_server_token | default('') | length > 0
    fail_msg: >
      Server token is not available. Ensure bootstrap master
      {{ groups['masters'][0] }} completed successfully.

- name: Write RKE2 agent config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ rke2_config_dir }}/config.yaml"
    mode: '0600'
  no_log: true
  diff: false
  notify: Restart rke2-agent
