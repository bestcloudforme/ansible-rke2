---
- name: Wait for Canal pods to exist and be Ready
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      TOTAL=$({{ rke2_bin_dir }}/kubectl --kubeconfig {{ rke2_config_dir }}/rke2.yaml \
        get pods -n kube-system -l k8s-app=canal --no-headers 2>/dev/null | wc -l)
      NOT_READY=$({{ rke2_bin_dir }}/kubectl --kubeconfig {{ rke2_config_dir }}/rke2.yaml \
        get pods -n kube-system -l k8s-app=canal \
        -o jsonpath='{range .items[*]}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' \
        | grep -v '^True$' | grep -c . || true)
      [ "$TOTAL" -gt 0 ] && [ "$NOT_READY" -eq 0 ] && echo 0 || echo 1
    executable: /bin/bash
  register: canal_check
  until: canal_check.stdout | trim | int == 0
  retries: 20
  delay: 15
  changed_when: false
