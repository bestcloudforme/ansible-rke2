---
# Usage:
#   ansible-playbook playbooks/fetch_kubeconfig.yml \
#     -i environments/my-cluster/inventory/hosts.yml
#
#   # Custom output path:
#   ansible-playbook playbooks/fetch_kubeconfig.yml \
#     -i environments/my-cluster/inventory/hosts.yml \
#     -e "kubeconfig_local_path=~/.kube/my-cluster.yaml"
#
# Downloads kubeconfig from bootstrap master and rewrites the server URL
# to use the LB VIP or external host so it works from outside the cluster.

- name: "Fetch kubeconfig from cluster"
  hosts: masters[0]
  become: true
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../defaults/rke2_defaults.yml"
  vars:
    kubeconfig_local_path: "{{ playbook_dir }}/../kubeconfig.yaml"
  tasks:
    - name: Read kubeconfig from master
      ansible.builtin.slurp:
        src: "{{ rke2_config_dir }}/rke2.yaml"
      register: raw_kubeconfig

    - name: Determine API server address
      ansible.builtin.set_fact:
        _api_server: >-
          {{ rke2_lb_vip
             if (rke2_lb_type in ['kube-vip', 'haproxy'] and rke2_lb_vip | default('') | length > 0)
             else (rke2_lb_external_host if rke2_lb_external_host | default('') | length > 0
                   else ansible_host | default(inventory_hostname)) }}

    - name: Write kubeconfig locally with correct server URL
      ansible.builtin.copy:
        content: >-
          {{ raw_kubeconfig.content | b64decode | regex_replace('https://(127\\.0\\.0\\.1|\\[::1\\]|localhost):6443', 'https://' ~ _api_server ~ ':6443') }}
        dest: "{{ kubeconfig_local_path }}"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: Kubeconfig saved
      ansible.builtin.debug:
        msg: "Kubeconfig saved to {{ kubeconfig_local_path }} (server: https://{{ _api_server }}:6443)"
